<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 760" width="700" height="760">
  <defs>
    <!-- Glow filters -->
    <filter id="gs" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gg" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gh" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="11" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gb" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dot-glow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="str-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Dot animation paths -->
    <style>
      @keyframes fd { 0%{offset-distance:0%;opacity:0} 8%{opacity:.9} 88%{opacity:.9} 100%{offset-distance:100%;opacity:0} }
      @keyframes fd2 { 0%{offset-distance:0%;opacity:0} 8%{opacity:.9} 88%{opacity:.9} 100%{offset-distance:100%;opacity:0} }
      @keyframes gp-s { 0%,100%{opacity:0.04} 50%{opacity:0.2} }
      @keyframes gp-b { 0%,100%{opacity:0.04} 50%{opacity:0.18} }
      @keyframes gp-g { 0%,100%{opacity:0.04} 50%{opacity:0.18} }
      @keyframes gp-h { 0%,100%{opacity:0.04} 50%{opacity:0.22} }
      .gr-s { animation: gp-s 2.8s ease-in-out infinite; }
      .gr-b { animation: gp-b 2.8s ease-in-out infinite 0.7s; }
      .gr-g { animation: gp-g 2.8s ease-in-out infinite 1.4s; }
      .gr-h { animation: gp-h 2.8s ease-in-out infinite 2.1s; }
      .dot1 { animation: fd 2.2s linear infinite; offset-rotate: 0deg; }
      .dot2 { animation: fd 2.2s linear infinite -0.73s; offset-rotate: 0deg; }
      .dot3 { animation: fd 2.2s linear infinite -1.47s; offset-rotate: 0deg; }
      .dot4 { animation: fd2 1.8s linear infinite; offset-rotate: 0deg; }
      .dot5 { animation: fd2 1.8s linear infinite -0.6s; offset-rotate: 0deg; }
      .dot6 { animation: fd2 1.8s linear infinite -1.2s; offset-rotate: 0deg; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="700" height="760" rx="12" fill="#0e0e14"/>

  <!-- ═══════════════ STRING BOXES ═══════════════ -->
  <!-- Str 1 (slot 1 → x=178) -->
  <g filter="url(#str-glow)">
    <rect x="178" y="5" width="164" height="58" rx="7" fill="#1a1200" stroke="#F9A825" stroke-width="1.5" opacity="1"/>
  </g>
  <text x="260" y="25" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="600" font-family="sans-serif" fill="#F9A825">◈ String 1</text>
  <text x="260" y="47" text-anchor="middle" dominant-baseline="middle" font-size="19" font-weight="700" font-family="sans-serif" fill="#ffffff">830 W</text>

  <!-- Str 2 (slot 2 → x=348) -->
  <g filter="url(#str-glow)">
    <rect x="348" y="5" width="164" height="58" rx="7" fill="#1a1200" stroke="#F9A825" stroke-width="1.5" opacity="1"/>
  </g>
  <text x="430" y="25" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="600" font-family="sans-serif" fill="#F9A825">◈ String 2</text>
  <text x="430" y="47" text-anchor="middle" dominant-baseline="middle" font-size="19" font-weight="700" font-family="sans-serif" fill="#ffffff">770 W</text>

  <!-- String lines to solar node -->
  <path d="M 260 63 C 260 135 175 120 175 133" fill="none" stroke="#F9A825" stroke-width="1.2" stroke-dasharray="5 3" opacity="0.5"/>
  <path d="M 430 63 C 430 135 175 120 175 133" fill="none" stroke="#F9A825" stroke-width="1.2" stroke-dasharray="5 3" opacity="0.45"/>

  <!-- ═══════════════ CONNECTORS ═══════════════ -->

  <!-- Solar → Battery (top arc) -->
  <path d="M 252 198 C 340 170 360 170 448 198" fill="none" stroke="#F9A825" stroke-width="20" opacity="0.06" stroke-linecap="round"/>
  <path d="M 252 198 C 340 170 360 170 448 198" fill="none" stroke="#F9A825" stroke-width="10" opacity="0.18" stroke-linecap="round"/>
  <path d="M 252 198 C 340 170 360 170 448 198" fill="none" stroke="#0e0e14" stroke-width="6.25" opacity="1" stroke-linecap="round"/>
  <path d="M 252 198 C 340 170 360 170 448 198" fill="none" stroke="#F9A825" stroke-width="1.25" opacity="0.50" stroke-linecap="round"/>

  <!-- Solar → Home (diagonal) -->
  <path d="M 230 287 C 310 330 390 400 448 453" fill="none" stroke="#F9A825" stroke-width="20" opacity="0.06" stroke-linecap="round"/>
  <path d="M 230 287 C 310 330 390 400 448 453" fill="none" stroke="#F9A825" stroke-width="10" opacity="0.18" stroke-linecap="round"/>
  <path d="M 230 287 C 310 330 390 400 448 453" fill="none" stroke="#0e0e14" stroke-width="6.25" opacity="1" stroke-linecap="round"/>
  <path d="M 230 287 C 310 330 390 400 448 453" fill="none" stroke="#F9A825" stroke-width="1.25" opacity="0.50" stroke-linecap="round"/>

  <!-- Solar → Grid (left vertical) -->
  <path d="M 163 287 C 135 340 135 420 163 453" fill="none" stroke="#F9A825" stroke-width="20" opacity="0.06" stroke-linecap="round"/>
  <path d="M 163 287 C 135 340 135 420 163 453" fill="none" stroke="#F9A825" stroke-width="10" opacity="0.06" stroke-linecap="round"/>
  <path d="M 163 287 C 135 340 135 420 163 453" fill="none" stroke="#0e0e14" stroke-width="6.25" opacity="1" stroke-linecap="round"/>
  <path d="M 163 287 C 135 340 135 420 163 453" fill="none" stroke="#F9A825" stroke-width="1.25" opacity="0.12" stroke-linecap="round"/>

  <!-- Battery → Home (right vertical) -->
  <path d="M 537 287 C 565 340 565 420 537 453" fill="none" stroke="#E91E63" stroke-width="20" opacity="0.06" stroke-linecap="round"/>
  <path d="M 537 287 C 565 340 565 420 537 453" fill="none" stroke="#E91E63" stroke-width="10" opacity="0.18" stroke-linecap="round"/>
  <path d="M 537 287 C 565 340 565 420 537 453" fill="none" stroke="#0e0e14" stroke-width="6.25" opacity="1" stroke-linecap="round"/>
  <path d="M 537 287 C 565 340 565 420 537 453" fill="none" stroke="#E91E63" stroke-width="1.25" opacity="0.50" stroke-linecap="round"/>

  <!-- Grid → Home (bottom arc) -->
  <path d="M 252 532 C 340 560 360 560 448 532" fill="none" stroke="#42A5F5" stroke-width="20" opacity="0.06" stroke-linecap="round"/>
  <path d="M 252 532 C 340 560 360 560 448 532" fill="none" stroke="#42A5F5" stroke-width="10" opacity="0.06" stroke-linecap="round"/>
  <path d="M 252 532 C 340 560 360 560 448 532" fill="none" stroke="#0e0e14" stroke-width="6.25" opacity="1" stroke-linecap="round"/>
  <path d="M 252 532 C 340 560 360 560 448 532" fill="none" stroke="#42A5F5" stroke-width="1.25" opacity="0.12" stroke-linecap="round"/>

  <!-- ═══════════════ FLOW DOTS ═══════════════ -->
  <!-- Solar → Home dots -->
  <circle r="6" fill="#F9A825" filter="url(#dot-glow)"
    style="offset-path:path('M 230 287 C 310 330 390 400 448 453');" class="dot1"/>
  <circle r="6" fill="#F9A825" filter="url(#dot-glow)"
    style="offset-path:path('M 230 287 C 310 330 390 400 448 453');" class="dot2"/>
  <circle r="6" fill="#F9A825" filter="url(#dot-glow)"
    style="offset-path:path('M 230 287 C 310 330 390 400 448 453');" class="dot3"/>

  <!-- Solar → Battery dots -->
  <circle r="6" fill="#F9A825" filter="url(#dot-glow)"
    style="offset-path:path('M 252 198 C 340 170 360 170 448 198');" class="dot4"/>
  <circle r="6" fill="#F9A825" filter="url(#dot-glow)"
    style="offset-path:path('M 252 198 C 340 170 360 170 448 198');" class="dot5"/>
  <circle r="6" fill="#F9A825" filter="url(#dot-glow)"
    style="offset-path:path('M 252 198 C 340 170 360 170 448 198');" class="dot6"/>

  <!-- ═══════════════ MAIN NODES ═══════════════ -->

  <!-- SOLAR node (175, 210) -->
  <circle cx="175" cy="210" r="93" fill="#F9A825" opacity="0.08" class="gr-s" filter="url(#gs)"/>
  <circle cx="175" cy="210" r="77" fill="#1e1400" stroke="#F9A825" stroke-width="2.5" filter="url(#gs)"/>
  <text x="175" y="189" text-anchor="middle" dominant-baseline="middle" font-size="19" font-weight="600" font-family="sans-serif" fill="#F9A825">☀ Solar</text>
  <text x="175" y="214" text-anchor="middle" dominant-baseline="middle" font-size="31" font-weight="700" font-family="sans-serif" fill="#ffffff">1.60 kW</text>

  <!-- BATTERY node (525, 210) -->
  <circle cx="525" cy="210" r="93" fill="#E91E63" opacity="0.08" class="gr-b" filter="url(#gb)"/>
  <circle cx="525" cy="210" r="77" fill="#1a0020" stroke="#E91E63" stroke-width="2.5" filter="url(#gb)"/>
  <text x="525" y="189" text-anchor="middle" dominant-baseline="middle" font-size="19" font-weight="600" font-family="sans-serif" fill="#E91E63">🔋 Battery</text>
  <text x="525" y="210" text-anchor="middle" dominant-baseline="middle" font-size="31" font-weight="700" font-family="sans-serif" fill="#ffffff">1.25 kW</text>
  <text x="525" y="240" text-anchor="middle" dominant-baseline="middle" font-size="15" font-family="sans-serif" fill="#ffffff" opacity="0.75">0 W</text>

  <!-- GRID node (175, 520) -->
  <circle cx="175" cy="520" r="93" fill="#42A5F5" opacity="0.08" class="gr-g" filter="url(#gg)"/>
  <circle cx="175" cy="520" r="77" fill="#001533" stroke="#42A5F5" stroke-width="2.5" filter="url(#gg)"/>
  <text x="175" y="499" text-anchor="middle" dominant-baseline="middle" font-size="19" font-weight="600" font-family="sans-serif" fill="#42A5F5">⚡ Grid</text>
  <text x="175" y="520" text-anchor="middle" dominant-baseline="middle" font-size="31" font-weight="700" font-family="sans-serif" fill="#ffffff">→ 0 W</text>
  <text x="175" y="550" text-anchor="middle" dominant-baseline="middle" font-size="15" font-family="sans-serif" fill="#ffffff" opacity="0.75">← 0 W</text>

  <!-- HOME node (525, 520) -->
  <circle cx="525" cy="520" r="93" fill="#EF5350" opacity="0.08" class="gr-h" filter="url(#gh)"/>
  <circle cx="525" cy="520" r="77" fill="#1a0500" stroke="#EF5350" stroke-width="2.5" filter="url(#gh)"/>
  <text x="525" y="499" text-anchor="middle" dominant-baseline="middle" font-size="19" font-weight="600" font-family="sans-serif" fill="#EF5350">🏠 Home</text>
  <text x="525" y="524" text-anchor="middle" dominant-baseline="middle" font-size="31" font-weight="700" font-family="sans-serif" fill="#ffffff">259 W</text>

  <!-- ═══════════════ LOAD BOXES ═══════════════ -->
  <!-- Wallbox (slot 2 → x=285) -->
  <rect x="285" y="638" width="130" height="58" rx="10" fill="#001a1a" stroke="#F9A825" stroke-width="1.8"/>
  <line x1="525" y1="597" x2="350" y2="638" stroke="#F9A825" stroke-width="1.4" stroke-dasharray="5 3" opacity="0.5"/>
  <text x="350" y="658" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="600" font-family="sans-serif" fill="#F9A825">EV Charger</text>
  <text x="350" y="679" text-anchor="middle" dominant-baseline="middle" font-size="19" font-weight="700" font-family="sans-serif" fill="#ffffff">0 W</text>

  <!-- Heat Pump (slot 1 → x=150) -->
  <rect x="150" y="638" width="130" height="58" rx="10" fill="#001a1a" stroke="#26C6DA" stroke-width="1.8" opacity="0.35"/>
  <line x1="525" y1="597" x2="215" y2="638" stroke="#26C6DA" stroke-width="1.4" stroke-dasharray="5 3" opacity="0.2"/>
  <text x="215" y="658" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="600" font-family="sans-serif" fill="#26C6DA" opacity="0.5">Heat Pump</text>
  <text x="215" y="679" text-anchor="middle" dominant-baseline="middle" font-size="19" font-weight="700" font-family="sans-serif" fill="#ffffff" opacity="0.35">0 W</text>

  <!-- ═══════════════ BUTTON ═══════════════ -->
  <g transform="translate(260, 715)">
    <rect x="0" y="0" width="180" height="44" rx="22" fill="#1565C0" opacity="0.95"/>
    <text x="90" y="22" text-anchor="middle" dominant-baseline="middle" font-size="18" font-weight="600" font-family="sans-serif" fill="#fff">⚡ Realtime</text>
  </g>
</svg>
